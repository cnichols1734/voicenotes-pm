<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Login to VoiceNotez" />
    <title>Login - VoiceNotez</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Sora:wght@100..800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Sora', sans-serif;
            background-color: #0A0A14;
            color: #F0EFF4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.04;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .auth-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .auth-bg .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
        }

        .auth-bg .glow-1 {
            width: 500px; height: 500px;
            background: #7B61FF;
            top: -150px; left: -100px;
        }

        .auth-bg .glow-2 {
            width: 400px; height: 400px;
            background: #7B61FF;
            bottom: -100px; right: -100px;
            opacity: 0.08;
        }

        .auth-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2rem;
            padding: 48px 40px;
            backdrop-filter: blur(20px);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .auth-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: rgba(123, 97, 255, 0.12);
            color: #7B61FF;
            margin-bottom: 20px;
        }

        .auth-title {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .auth-subtitle {
            font-size: 14px;
            color: #8E8E93;
            font-family: 'Fira Code', monospace;
        }

        .auth-flash {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 20px;
            font-family: 'Fira Code', monospace;
        }

        .auth-flash-error {
            background: rgba(255, 69, 58, 0.1);
            color: #ff453a;
            border: 1px solid rgba(255, 69, 58, 0.15);
        }

        .auth-flash-success {
            background: rgba(50, 215, 75, 0.1);
            color: #32d74b;
            border: 1px solid rgba(50, 215, 75, 0.15);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #8E8E93;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-family: 'Fira Code', monospace;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #F0EFF4;
            font-family: 'Sora', sans-serif;
            font-size: 15px;
            transition: border-color 200ms ease, background 200ms ease;
            outline: none;
        }

        .form-input::placeholder {
            color: #48484a;
        }

        .form-input:focus {
            border-color: #7B61FF;
            background: rgba(123, 97, 255, 0.04);
        }

        .auth-submit {
            width: 100%;
            margin-top: 8px;
            padding: 16px;
            background: #7B61FF;
            color: #fff;
            border: none;
            border-radius: 999px;
            font-family: 'Sora', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 200ms ease, transform 200ms ease;
        }

        .auth-submit:hover {
            background: #6a50e6;
            transform: scale(1.02);
        }

        .auth-footer {
            text-align: center;
            margin-top: 28px;
            font-size: 14px;
            color: #636366;
        }

        .auth-link {
            color: #7B61FF;
            font-weight: 600;
            text-decoration: none;
            transition: color 200ms ease;
        }

        .auth-link:hover {
            color: #9b85ff;
        }
    </style>
</head>

<body>
    <div class="auth-bg">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="7.86 2 16.14 2 21 7 21 17 16.14 22 7.86 22 3 17 3 7" />
                </svg>
            </div>
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Sign in to VoiceNotez</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="auth-flash auth-flash-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login_submit') }}">
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" class="form-input" id="email" name="email" placeholder="you@example.com"
                    required autocomplete="email" autofocus />
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" class="form-input" id="password" name="password" placeholder="••••••••"
                    required autocomplete="current-password" />
            </div>
            <button type="submit" class="auth-submit">Sign In</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="{{ url_for('auth.register_page') }}" class="auth-link">Create one</a>
        </div>
    </div>
</body>

</html>
